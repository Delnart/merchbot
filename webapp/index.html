<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merch Store</title>
    <link rel="stylesheet" href="/webapp/css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <nav class="bottom-nav" id="bottomNav">
        <button class="nav-item active" data-page="catalog">
            <span class="nav-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
            </span>
            <span>Каталог</span>
        </button>
        <button class="nav-item" data-page="cart">
            <span class="nav-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
            </span>
            <span>Кошик</span>
            <span class="cart-badge" id="cartBadge" style="display:none">0</span>
        </button>
        <button class="nav-item" data-page="settings">
            <span class="nav-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <span>Профіль</span>
        </button>
        <button class="nav-item" data-page="admin" id="adminNavItem" style="display:none">
            <span class="nav-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 00-2 2v.18a2 2 0 01-1 1.73l-.43.25a2 2 0 01-2 0l-.15-.08a2 2 0 00-2.73.73l-.22.38a2 2 0 00.73 2.73l.15.1a2 2 0 011 1.72v.51a2 2 0 01-1 1.74l-.15.09a2 2 0 00-.73 2.73l.22.38a2 2 0 002.73.73l.15-.08a2 2 0 012 0l.43.25a2 2 0 011 1.73V20a2 2 0 002 2h.44a2 2 0 002-2v-.18a2 2 0 011-1.73l.43-.25a2 2 0 012 0l.15.08a2 2 0 002.73-.73l.22-.39a2 2 0 00-.73-2.73l-.15-.08a2 2 0 01-1-1.74v-.5a2 2 0 011-1.74l.15-.09a2 2 0 00.73-2.73l-.22-.38a2 2 0 00-2.73-.73l-.15.08a2 2 0 01-2 0l-.43-.25a2 2 0 01-1-1.73V4a2 2 0 00-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            </span>
            <span>Адмін</span>
        </button>
    </nav>

    <div class="page active" id="page-catalog">
        <div class="app-header">
            <h1>Каталог</h1>
        </div>
        <div id="catalogGrid" class="product-grid"></div>
        <div id="catalogLoading" class="loading"><div class="spinner"></div></div>
        <div id="catalogEmpty" class="empty-state" style="display:none">
            <div class="empty-icon">—</div>
            <div class="empty-text">Предзамовлення недоступне</div>
        </div>
    </div>

    <div class="page" id="page-product">
        <div class="app-header">
            <button class="back-btn" onclick="app.navigate('catalog')">←</button>
            <h1 id="productDetailTitle">Товар</h1>
        </div>
        <div id="productDetail"></div>
    </div>

    <div class="page" id="page-cart">
        <div class="app-header">
            <h1>Кошик</h1>
        </div>
        <div id="cartContent"></div>
    </div>

    <div class="page" id="page-checkout">
        <div class="app-header">
            <button class="back-btn" onclick="app.navigate('cart')">←</button>
            <h1>Оформлення</h1>
        </div>
        <div id="checkoutContent"></div>
    </div>

    <div class="page" id="page-settings">
        <div class="app-header">
            <h1>Мій профіль</h1>
        </div>
        <div id="settingsContent"></div>
    </div>

    <div class="page" id="page-admin">
        <div class="app-header">
            <h1>Управління товарами</h1>
        </div>
        <div id="adminContent"></div>
    </div>

    <div class="page" id="page-admin-edit">
        <div class="app-header">
            <button class="back-btn" onclick="app.navigate('admin')">←</button>
            <h1 id="adminEditTitle">Товар</h1>
        </div>
        <div id="adminEditContent"></div>
    </div>

    <div class="page" id="page-success">
        <div class="success-page">
            <div class="success-icon">✓</div>
            <div class="success-title">Замовлення оформлено</div>
            <div class="success-text" id="successText">Ваше замовлення прийнято. Ми перевіримо оплату та повідомимо вас.</div>
            <button class="btn-primary" onclick="app.navigate('catalog')">Повернутись до каталогу</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="/webapp/js/api.js"></script>
    <script src="/webapp/js/catalog.js"></script>
    <script src="/webapp/js/cart.js"></script>
    <script src="/webapp/js/checkout.js"></script>
    <script src="/webapp/js/admin.js"></script>
    <script src="/webapp/js/settings.js"></script>
    <script src="/webapp/js/app.js"></script>
</body>
</html>
