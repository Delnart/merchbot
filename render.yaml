services:
  - type: web
    name: merchfice-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: ADMIN_DEFAULT_CURRENCY
        value: UAH
      - key: ADMIN_OWNER_IDS
        sync: false
      - key: BROADCAST_DELAY_MS
        value: 100

  - type: web
    name: merchfice-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- -p $PORT
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
